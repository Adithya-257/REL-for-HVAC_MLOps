# configs/dqn_v2.yaml
# Tuned DQN experiment — faster epsilon decay, larger batch
# Reproduce with: python train.py --config configs/dqn_v2.yaml
# Git tag: exp-dqn-v2
 
run_name:          "dqn-hvac-v2-tuned"
episodes:          600
seed:              42
lr:                0.001
gamma:             0.99
epsilon_start:     1.0
epsilon_end:       0.05
epsilon_decay:     0.990
batch_size:        128
buffer_capacity:   10000
target_update_freq: 50
 