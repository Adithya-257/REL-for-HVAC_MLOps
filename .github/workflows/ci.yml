name: RL-HVAC CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------
  # Job 1: Run tests
  # ---------------------------------------------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run environment tests
        run: python -m pytest tests/ -v

  # ---------------------------------------------------------------
  # Job 2: Short training run + MLflow logging
  # ---------------------------------------------------------------
  train:
    name: Training Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run short training (50 episodes)
        run: python train.py
        env:
          EPISODES: 50
          MLFLOW_TRACKING_URI: mlruns

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: dqn-hvac-model
          path: models/dqn_hvac.pth

      - name: Upload training plots
        uses: actions/upload-artifact@v4
        with:
          name: training-plots
          path: results/

  # ---------------------------------------------------------------
  # Job 3: Build Docker image
  # ---------------------------------------------------------------
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: train

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: dqn-hvac-model
          path: models/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t rl-hvac-api:latest .

      - name: Verify container starts
        run: |
          docker run -d --name hvac-test -p 8000:8000 rl-hvac-api:latest
          sleep 5
          curl -f http://localhost:8000/ && echo "Health check passed"
          docker stop hvac-test