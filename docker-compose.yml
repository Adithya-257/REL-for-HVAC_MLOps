version: "3.9"

services:

  # ---------------------------------------------------------------
  # FastAPI inference server
  # ---------------------------------------------------------------
  api:
    build: .
    container_name: hvac-api
    ports:
      - "8000:8000"
    volumes:
      # Mount mlruns so the container can log to the same MLflow store
      - ./mlruns:/app/mlruns
      - ./models:/app/models
    environment:
      - MODEL_PATH=models/dqn_hvac.pth
      - MLFLOW_TRACKING_URI=mlruns
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------
  # MLflow UI — view training runs and metrics
  # ---------------------------------------------------------------
  mlflow:
    image: python:3.11-slim
    container_name: hvac-mlflow
    working_dir: /app
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
    command: >
      bash -c "pip install mlflow --quiet &&
               mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri mlruns"
    restart: unless-stopped